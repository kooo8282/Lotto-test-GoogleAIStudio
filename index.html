<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <button id="theme-toggle" class="theme-btn" aria-label="다크모드 전환">🌙</button>
    
    <div class="container">
        <h1>로또 번호 생성기</h1>
        <p>버튼을 눌러 행운의 번호를 확인하세요!</p>
        
        <div class="ball-container" id="ball-container">
            <!-- 초기 빈 공(Placeholder) 형태 -->
            <div class="placeholder-balls">
                <div class="ball placeholder"></div>
                <div class="ball placeholder"></div>
                <div class="ball placeholder"></div>
                <div class="ball placeholder"></div>
                <div class="ball placeholder"></div>
                <div class="ball placeholder"></div>
            </div>
        </div>

        <button id="generate-btn" class="generate-btn">번호 생성하기</button>
    </div>

    <script src="/src/script.js"></script>
</body>
</html>
